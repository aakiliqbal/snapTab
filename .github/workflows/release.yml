name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release runs from main
        if: github.ref_name != 'main'
        run: |
          echo "Release workflow can only run from the main branch." >&2
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine release version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NEXT_VERSION="$PACKAGE_VERSION"

          while git show-ref --tags --verify --quiet "refs/tags/v$NEXT_VERSION"; do
            NEXT_VERSION=$(node -e "const [major, minor, patch] = '$NEXT_VERSION'.split('.').map(Number); console.log([major, minor, patch + 1].join('.'))")
          done

          node - "$NEXT_VERSION" <<'NODE'
          const fs = require('fs');
          const nextVersion = process.argv[2];

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = nextVersion;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          lock.version = nextVersion;
          if (lock.packages && lock.packages['']) lock.packages[''].version = nextVersion;
          fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');

          const manifest = JSON.parse(fs.readFileSync('public/manifest.json', 'utf8'));
          manifest.version = nextVersion;
          fs.writeFileSync('public/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          NODE

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/${{ steps.version.outputs.tag }}"; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists after version selection." >&2
            exit 1
          fi

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../snaptab-${{ steps.version.outputs.tag }}.zip .

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          {
            echo "## SnapTab ${{ steps.version.outputs.tag }}"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since $PREVIOUS_TAG:"
              echo
              git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s (%h)"
            else
              echo "Initial release changes:"
              echo
              git log --pretty=format:"- %s (%h)"
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SnapTab ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: snaptab-${{ steps.version.outputs.tag }}.zip
